---
- name: pacman -Syu
  community.general.pacman:
    update_cache: true
    upgrade: true
  become: true
  
- name: nftables
  block:
  
  - name: install nftables
    community.general.pacman:
      name: nftables
      state: latest

  - name: use our nftables.conf file
    ansible.builtin.template:
      src: nftables.conf.j2
      dest: /etc/nftables.conf
      owner: root
      group: root
      mode: '0644'
      validate: nft -cf %s

  - name: enable nftables systemd service
    ansible.builtin.systemd_service:
      name: nftables
      enabled: true
      state: started

  become: true

- name: fail2ban
  block:

  - name: install fail2ban
    community.general.pacman:
      name: fail2ban
      state: latest

  - name: setup fail2ban.local
    ansible.builtin.template:
      src: fail2ban.local.j2
      dest: /etc/fail2ban/fail2ban.local
      owner: root
      group: root
      mode: '0644'

  - name: setup jail.local
    ansible.builtin.template:
      src: jail.local.j2
      dest: /etc/fail2ban/jail.local
      owner: root
      group: root
      mode: '0644'

  - name: setup nftables-common.local
    ansible.builtin.template:
      src: nftables-common.local.j2
      dest: /etc/fail2ban/action.d/nftables-common.local
      owner: root
      group: root
      mode: '0644'

  - name: enable fail2ban systemd service
    ansible.builtin.systemd_service:
      name: fail2ban
      enabled: true
      state: started
  become: true


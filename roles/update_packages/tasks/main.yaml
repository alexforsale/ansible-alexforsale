---
- name: apt update
  block:
  - name: update package repository cache
    ansible.builtin.apt:
      update_cache: yes
  
  - name: update all packages to their latest version
    ansible.builtin.apt:
      name: "*"
      state: latest
  when: ansible_os_family | lower == 'debian'
  become: true


- name: pacman -Syu
  community.general.pacman:
    update_cache: true
    upgrade: true
  when: ansible_os_family | lower == 'archlinux'
  become: true
